<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATTLEZONE — FPS Arena</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root {
  --bg:#0a0c0f; --panel:#0f1318; --border:#1a2230;
  --accent:#00e5ff; --red:#ff2244; --green:#00ff88;
  --yellow:#ffcc00; --orange:#ff6600; --text:#c8d8e8; --dim:#445566;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow:hidden;height:100vh;user-select:none;cursor:default;}
.screen{position:fixed;inset:0;display:none;pointer-events:none;z-index:1;}
.screen.active{display:flex;pointer-events:auto;z-index:2;}

/* MENU */
#menuScreen{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0d1a2a,#050810);overflow:hidden;}
#menuScreen .menu-bg-grid{z-index:0;pointer-events:none;}
.menu-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:60px 60px;animation:gridScroll 20s linear infinite;pointer-events:none;z-index:0;}
@keyframes gridScroll{to{background-position:0 60px;}}
.menu-logo{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;letter-spacing:8px;color:var(--accent);text-shadow:0 0 40px rgba(0,229,255,0.6);z-index:2;position:relative;pointer-events:none;}
.menu-sub{font-size:13px;letter-spacing:12px;color:var(--dim);margin-top:8px;z-index:2;position:relative;pointer-events:none;}
.menu-btns{display:flex;flex-direction:column;gap:12px;margin-top:60px;z-index:2;position:relative;}
.mbtn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:4px;padding:14px 60px;cursor:pointer!important;transition:all 0.2s;z-index:10;position:relative;-webkit-tap-highlight-color:transparent;}
.mbtn:hover{background:rgba(0,229,255,0.12);box-shadow:0 0 20px rgba(0,229,255,0.3);}
.mbtn.red{border-color:var(--red);color:var(--red);}
.mbtn.red:hover{background:rgba(255,34,68,0.12);}
.mbtn.gold{border-color:var(--yellow);color:var(--yellow);}
.mbtn.gold:hover{background:rgba(255,204,0,0.12);}
.menu-stats{margin-top:50px;font-size:10px;color:var(--dim);letter-spacing:3px;z-index:2;position:relative;pointer-events:none;}

/* LOBBY */
#lobbyScreen{flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow-y:auto;}
.lobby-title{font-family:'Orbitron',sans-serif;font-size:26px;color:var(--accent);letter-spacing:6px;margin-bottom:30px;pointer-events:none;}
.mode-row{display:flex;width:700px;background:var(--panel);border:1px solid var(--border);margin-bottom:20px;}
.mode-btn{flex:1;padding:12px;background:transparent;border:none;color:var(--dim);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer!important;transition:all 0.2s;border-bottom:2px solid transparent;position:relative;z-index:10;}
.mode-btn.active{background:rgba(0,229,255,0.1);color:var(--accent);border-bottom-color:var(--accent);}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:700px;}
.map-card{background:var(--panel);border:2px solid var(--border);padding:20px;cursor:pointer!important;transition:all 0.2s;position:relative;z-index:5;-webkit-tap-highlight-color:transparent;}
.map-card:hover{border-color:var(--accent);background:#121a24;transform:translateY(-2px);}
.map-card.sel{border-color:var(--accent);box-shadow:0 0 20px rgba(0,229,255,0.2);}
.map-preview{width:100%;height:80px;background:#050810;border:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:2px;color:var(--dim);pointer-events:none;}
.map-name{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--accent);margin-bottom:4px;pointer-events:none;}
.map-desc{font-size:11px;color:var(--dim);line-height:1.5;pointer-events:none;}
.map-meta{font-size:9px;color:var(--dim);margin-top:6px;letter-spacing:2px;pointer-events:none;}
.lobby-btns{display:flex;gap:16px;margin-top:24px;position:relative;z-index:10;}

/* SHOP */
#shopScreen{flex-direction:column;background:var(--bg);overflow-y:auto;pointer-events:auto;}
.shop-hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.shop-title-text{font-family:'Orbitron',sans-serif;font-size:22px;color:var(--yellow);letter-spacing:6px;}
.coins-badge{display:flex;align-items:center;gap:8px;font-family:'Orbitron',sans-serif;font-size:20px;color:var(--yellow);}
.shop-tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);padding:0 40px;}
.s-tab{padding:14px 24px;background:transparent;border:none;color:var(--dim);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer!important;border-bottom:2px solid transparent;transition:all 0.2s;position:relative;z-index:5;position:relative;z-index:5;cursor:pointer!important;}
.s-tab.active{color:var(--yellow);border-bottom-color:var(--yellow);}
.shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:32px 40px;}
.s-item{background:var(--panel);border:1px solid var(--border);padding:18px;cursor:pointer;transition:border-color 0.2s,transform 0.2s;position:relative;}
.s-item:hover{border-color:var(--yellow);transform:translateY(-2px);}
.s-item.owned{border-color:var(--green);}
.s-item.equipped{border-color:var(--accent);box-shadow:0 0 16px rgba(0,229,255,0.2);}
.s-icon{font-size:34px;text-align:center;margin-bottom:10px;min-height:64px;}
.s-name{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--text);margin-bottom:4px;}
.s-desc{font-size:10px;color:var(--dim);line-height:1.5;margin-bottom:10px;}
.s-stats{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.s-stat{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--dim);}
.s-stat-label{width:65px;flex-shrink:0;}
.s-bar{flex:1;height:3px;background:#1a2230;border-radius:2px;}
.s-fill{height:100%;border-radius:2px;}
.s-fill.acc{background:var(--accent);}
.s-fill.dmg{background:var(--red);}
.s-fill.spd{background:var(--yellow);}
.s-fill.hp{background:var(--green);}
.s-price-row{display:flex;align-items:center;justify-content:space-between;}
.s-price{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--yellow);}
.s-btn{background:rgba(255,204,0,0.1);border:1px solid var(--yellow);color:var(--yellow);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:5px 12px;cursor:pointer!important;transition:background 0.2s;position:relative;z-index:5;position:relative;z-index:5;cursor:pointer!important;}
.s-btn:hover{background:rgba(255,204,0,0.25);}
.s-btn.owned-btn{border-color:var(--green);color:var(--green);background:rgba(0,255,136,0.08);cursor:default;}
.s-btn.eq-btn{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.08);}
.rarity{position:absolute;top:8px;right:8px;font-size:8px;letter-spacing:2px;padding:2px 6px;}
.r-common{color:#88aacc;border:1px solid #88aacc44;}
.r-rare{color:#4488ff;border:1px solid #4488ff44;}
.r-epic{color:#aa44ff;border:1px solid #aa44ff44;}
.r-legendary{color:var(--yellow);border:1px solid rgba(255,204,0,0.4);}

/* GAME */
#gameScreen{flex-direction:column;background:#000;}
#gameCanvas{position:fixed;inset:0;cursor:crosshair;display:block;}
#gameScreen:not(.active) #gameCanvas{pointer-events:none;}
#hud{position:absolute;inset:0;pointer-events:none;}

/* Crosshair */
.xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;}
.xhair::before{content:'';position:absolute;width:2px;height:100%;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.8);}
.xhair::after{content:'';position:absolute;height:2px;width:100%;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.8);}
.xhair .dot{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}

/* HUD TOP */
#hudTop{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(rgba(0,0,0,0.75),transparent);display:flex;align-items:flex-start;padding:10px 24px 0;justify-content:space-between;}
.t-score{text-align:center;}
.t-name{font-size:10px;letter-spacing:3px;}
.t-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;}
.t-blue .t-name,.t-blue .t-val{color:var(--accent);}
.t-red .t-name,.t-red .t-val{color:var(--red);}
#gameTimer{font-family:'Orbitron',sans-serif;font-size:22px;color:#fff;letter-spacing:4px;}
.hud-top-right{text-align:right;}
#modeDisplay{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--accent);letter-spacing:3px;}
#mapDisplay{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:2px;}

/* HUD BOTTOM */
#hudBottom{position:absolute;bottom:0;left:0;right:0;height:95px;background:linear-gradient(transparent,rgba(0,0,0,0.85));display:flex;align-items:flex-end;padding:0 24px 16px;justify-content:space-between;}
.hud-section{display:flex;flex-direction:column;gap:4px;}
.hud-label{font-size:10px;letter-spacing:3px;color:var(--dim);}
.hud-big{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:700;}
.hud-big.green{color:var(--green);}
.hud-big.cyan{color:var(--accent);}
.bar-outer{height:4px;background:#1a2230;border-radius:2px;}
#hpBar{width:160px;}
#sprintBarOuter{width:80px;margin-top:4px;}
.bar-inner{height:100%;border-radius:2px;transition:width 0.2s;}
.weapon-center{display:flex;flex-direction:column;align-items:center;gap:6px;}
.wep-name{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--accent);letter-spacing:2px;}
.ammo-row{display:flex;align-items:baseline;gap:6px;}
.ammo-mag{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:700;color:var(--accent);}
.ammo-res{font-size:14px;color:var(--dim);}
.hud-kda{font-family:'Orbitron',sans-serif;font-size:20px;color:var(--yellow);text-align:right;}

/* Reload bar */
#reloadBar{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:5px;}
#reloadBar.active{display:flex;}
#reloadInner{height:100%;background:var(--yellow);width:0%;display:block;}
.reload-label{font-size:11px;letter-spacing:3px;color:var(--yellow);}
.reload-outer{width:200px;height:4px;background:#1a2230;border-radius:2px;}
#reloadInner{height:100%;background:var(--yellow);width:0%;}

/* Grenade HUD */
#grenadeHUD{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
.g-slot{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.6);border:1px solid var(--border);padding:5px 12px;}
.g-slot span{font-family:'Orbitron',sans-serif;font-size:15px;}

/* XP bar */
#xpBarOuter{position:absolute;top:50px;left:0;right:0;height:3px;background:transparent;pointer-events:none;}
#xpBarInner{height:100%;background:linear-gradient(90deg,var(--accent),#8800ff);width:0%;transition:width 0.4s;}
#levelDisp{position:absolute;top:55px;right:20px;text-align:right;font-size:10px;pointer-events:none;color:var(--dim);letter-spacing:2px;}

/* Kill feed */
#killfeed{position:absolute;top:80px;right:20px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none;}
.kf-item{background:rgba(0,0,0,0.65);border-left:2px solid var(--red);padding:4px 10px;font-size:12px;animation:kfAnim 3s ease forwards;}
.kf-item.kf-player{border-left-color:var(--green);}
@keyframes kfAnim{0%{opacity:0;transform:translateX(20px)}15%{opacity:1;transform:none}70%{opacity:1}100%{opacity:0}}

/* Streak banner */
#streakBanner{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:3px;pointer-events:none;}
#streakText{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:var(--orange);text-shadow:0 0 30px rgba(255,102,0,0.8);letter-spacing:6px;}
#streakSub{font-size:11px;color:var(--yellow);letter-spacing:4px;}

/* Minimap */
#minimap{position:absolute;bottom:100px;right:20px;width:130px;height:130px;background:rgba(0,0,0,0.7);border:1px solid var(--border);pointer-events:none;}
#minimapCanvas{width:130px;height:130px;}

/* Controls hint */
#ctrlHint{position:absolute;bottom:100px;left:20px;font-size:10px;pointer-events:none;color:rgba(100,130,160,0.45);letter-spacing:1px;line-height:1.9;}

/* Hit flash */
#hitFlash{position:absolute;inset:0;pointer-events:none;border:3px solid transparent;transition:border-color 0.1s;}
#hitFlash.active{border-color:rgba(255,34,68,0.55);animation:hitAnim 0.3s ease;}
@keyframes hitAnim{0%,100%{border-color:transparent}50%{border-color:rgba(255,34,68,0.6)}}

/* Explosion overlay */
#expOverlay{position:absolute;inset:0;pointer-events:none;background:rgba(255,120,0,0);transition:background 0.15s;}

/* AIM overlay */
#aimOvl{position:absolute;inset:0;pointer-events:none;display:none;}
#aimOvl .ao-shade{position:absolute;inset:0;background:rgba(0,0,0,0.35);}
#aimOvl .ao-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;box-shadow:0 0 0 9999px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.15);}
#aimOvl .ao-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.4);transform:translateY(-50%);}
#aimOvl .ao-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.4);transform:translateX(-50%);}
#aimOvl .ao-dot{position:absolute;top:50%;left:50%;width:4px;height:4px;background:var(--red);border-radius:50%;transform:translate(-50%,-50%);}

/* Death overlay */
#deathOverlay{position:absolute;inset:0;background:rgba(80,0,0,0);display:none;pointer-events:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:background 0.4s;}
#deathOverlay.active{display:flex;pointer-events:auto;background:rgba(80,0,0,0.45);}
.death-txt{font-family:'Orbitron',sans-serif;font-size:38px;color:var(--red);letter-spacing:8px;text-shadow:0 0 30px rgba(255,34,68,0.8);}
.respawn-txt{font-size:14px;color:var(--text);letter-spacing:4px;}

/* Round end */
#roundEnd{position:absolute;inset:0;background:rgba(0,0,0,0.82);display:none;pointer-events:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;pointer-events:auto;z-index:45;}
#roundEnd.active{display:flex;pointer-events:auto;}
.re-result{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;letter-spacing:8px;}
.re-win{color:var(--green);text-shadow:0 0 40px rgba(0,255,136,0.5);}
.re-lose{color:var(--red);text-shadow:0 0 40px rgba(255,34,68,0.5);}
.re-stats{font-size:13px;color:var(--dim);letter-spacing:3px;}

/* Scoreboard */
#scoreboard{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:none;pointer-events:none;align-items:center;justify-content:center;z-index:40;}
#scoreboard.active{display:flex;pointer-events:auto;}
.sb-wrap{width:680px;}
.sb-title{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--accent);letter-spacing:6px;text-align:center;margin-bottom:18px;}
.sb-table{width:100%;border-collapse:collapse;}
.sb-table th{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--dim);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;}
.sb-table td{padding:9px 12px;font-size:12px;border-bottom:1px solid #0f1318;}
.sb-table .me td{color:var(--accent);}

/* Pause */
#pauseMenu{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:none;pointer-events:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:50;pointer-events:auto;}
#pauseMenu.active{display:flex;pointer-events:auto;}
.pause-title{font-family:'Orbitron',sans-serif;font-size:30px;color:var(--accent);letter-spacing:8px;margin-bottom:16px;}

.ch-btn{background:rgba(0,229,255,0.08);border:1px solid var(--dim);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:5px 12px;cursor:pointer;transition:all 0.2s;}
.ch-btn:hover,.ch-btn.ch-active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.15);}
.mmap-btn{background:rgba(0,0,0,0.4);border:1px solid var(--dim);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;padding:5px 10px;cursor:pointer;transition:all 0.2s;}
.mmap-btn:hover,.mmap-btn.mmap-active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,204,0,0.1);}

/* Damage numbers */
.dmg-num{position:absolute;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--red);pointer-events:none;animation:dmgFloat 0.9s ease forwards;text-shadow:0 0 10px rgba(255,34,68,0.8);}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}

/* Toast */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid var(--accent);padding:11px 26px;font-size:13px;color:var(--accent);letter-spacing:2px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── NEW SETTINGS MENU ── */
.settings-tabs{display:flex;gap:0;width:760px;background:var(--panel);border:1px solid var(--border);}
.settings-tab{flex:1;padding:14px 10px;background:transparent;border:none;color:var(--dim);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer!important;transition:all .2s;border-bottom:2px solid transparent;position:relative;z-index:10;}
.settings-tab.active{color:var(--accent);background:rgba(0,229,255,.08);border-bottom-color:var(--accent);}
.settings-tab:hover{color:var(--text);}
.settings-body{width:760px;background:rgba(10,14,20,.6);border:1px solid var(--border);border-top:none;padding:28px 36px;min-height:420px;max-height:55vh;overflow-y:auto;}
.settings-pane{display:none;flex-direction:column;gap:20px;}
.settings-pane.active{display:flex;}
.sg-row{display:flex;flex-direction:column;gap:6px;}
.sg-lbl{display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:2px;color:var(--text);}
.sg-val{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--yellow);}
.sg-sub{display:flex;justify-content:space-between;font-size:9px;color:var(--dim);letter-spacing:2px;margin-top:2px;}
.sg-toggle-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
.sg-color-row{display:flex;gap:8px;align-items:center;margin-top:2px;}
.toggle-btn{background:rgba(0,229,255,.06);border:1px solid var(--dim);color:var(--dim);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:8px 16px;cursor:pointer!important;transition:all .15s;position:relative;z-index:5;}
.toggle-btn:hover{border-color:var(--text);color:var(--text);}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.15);}
.color-btn{width:28px;height:28px;border-radius:50%;border:2px solid #444;cursor:pointer!important;transition:transform .15s;position:relative;z-index:5;}
.color-btn:hover{transform:scale(1.15);}
#settingsBody input[type=range]{width:100%;accent-color:var(--yellow);cursor:pointer;height:5px;}
</style>
</head>
<body>
<div id="toast"></div>

<!-- MENU -->
<div id="menuScreen" class="screen active">
  <div class="menu-bg-grid"></div>
  <div class="menu-logo">BATTLEZONE</div>
  <div class="menu-sub">TACTICAL FPS ARENA — SEASON 7</div>
  <div class="menu-btns">
    <button class="mbtn" onclick="showScreen('lobbyScreen')">▶ SPIELEN</button>
    <button class="mbtn gold" onclick="openShop('weapons')">🛒 WAFFENSHOP</button>
    <button class="mbtn" onclick="openShop('armor')">🛡 AUSRÜSTUNG</button>
    <button class="mbtn" onclick="openSettingsMenu()">⚙️ EINSTELLUNGEN</button>
  </div>
  <div class=
